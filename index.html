<title>折り紙の折り順自動生成 — デモ</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #F7F5F0;
    --bg-card: #FFFFFF;
    --text: #2A2A2A;
    --text-sub: #6B6560;
    --border: #D8D3CC;
    --accent: #B8963E;
    --mountain: #C84B4B;
    --valley: #4B7EC8;
    --back-green: #8BBF7A;
    --shadow: rgba(58, 50, 40, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1B19;
      --bg-card: #26251F;
      --text: #E8E4DC;
      --text-sub: #9E978E;
      --border: #3E3B34;
      --accent: #D4AE4E;
      --mountain: #E06060;
      --valley: #6A9EE0;
      --back-green: #7DAF6A;
      --shadow: rgba(0, 0, 0, 0.3);
    }
  }
  :root[data-theme="dark"] {
    --bg: #1C1B19;
    --bg-card: #26251F;
    --text: #E8E4DC;
    --text-sub: #9E978E;
    --border: #3E3B34;
    --accent: #D4AE4E;
    --mountain: #E06060;
    --valley: #6A9EE0;
    --back-green: #7DAF6A;
    --shadow: rgba(0, 0, 0, 0.3);
  }
  :root[data-theme="light"] {
    --bg: #F7F5F0;
    --bg-card: #FFFFFF;
    --text: #2A2A2A;
    --text-sub: #6B6560;
    --border: #D8D3CC;
    --accent: #B8963E;
    --mountain: #C84B4B;
    --valley: #4B7EC8;
    --back-green: #8BBF7A;
    --shadow: rgba(58, 50, 40, 0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  .page-header {
    max-width: 56rem;
    margin: 0 auto;
    padding: 3rem 1.5rem 1rem;
    text-align: center;
  }
  .page-header h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-wrap: balance;
    line-height: 1.4;
  }
  .page-header .desc {
    margin-top: 1rem;
    font-size: 0.95rem;
    color: var(--text-sub);
    max-width: 40rem;
    margin-left: auto;
    margin-right: auto;
  }

  .divider {
    max-width: 56rem;
    margin: 0 auto;
    border: none;
    border-top: 1px solid var(--border);
  }

  nav.model-nav {
    max-width: 56rem;
    margin: 1.5rem auto;
    padding: 0 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  nav.model-nav a {
    display: inline-block;
    padding: 0.4rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 2rem;
    text-decoration: none;
    color: var(--text);
    font-size: 0.85rem;
    transition: border-color 0.2s, color 0.2s;
  }
  nav.model-nav a:hover,
  nav.model-nav a:focus-visible {
    border-color: var(--accent);
    color: var(--accent);
    outline: none;
  }

  .model-section {
    max-width: 56rem;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }
  .model-section h2 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }

  .content-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .content-block h3 {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    margin-bottom: 1rem;
  }
  .content-block .img-wrap {
    text-align: center;
  }
  .content-block .img-wrap img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }
  .step-card {
    text-align: center;
  }
  .step-card img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff;
  }
  .step-card .step-num {
    display: inline-block;
    margin-top: 0.4rem;
    font-size: 0.75rem;
    font-variant-numeric: tabular-nums;
    color: var(--text-sub);
  }
  .step-card .step-kind {
    display: block;
    font-size: 0.8rem;
    color: var(--text);
    margin-top: 0.15rem;
  }

  .legend {
    max-width: 56rem;
    margin: 1rem auto 3rem;
    padding: 0 1.5rem;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: var(--text-sub);
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }

  footer {
    max-width: 56rem;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-sub);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 480px) {
    .steps-grid { grid-template-columns: repeat(2, 1fr); }
    .page-header { padding: 2rem 1rem 0.5rem; }
    .model-section { padding: 0 1rem; }
  }
</style>

<header class="page-header">
  <h1>逆方向探索による折り紙の折り順自動生成</h1>
  <p class="desc">
    展開図から完成形の折り順を自動で生成しています。
    各作品の展開図・折り順・折りたたみアニメーションを確認できます。
  </p>
</header>

<hr class="divider">

<nav class="model-nav">
  <a href="#crane">鶴</a>
</nav>

<div class="legend">
  <span class="legend-item">
    <span class="legend-swatch" style="background:#fff;"></span> 表面
  </span>
  <span class="legend-item">
    <span class="legend-swatch" style="background:#B4E5A2;"></span> 裏面
  </span>
  <span class="legend-item">
    <span class="legend-swatch" style="background:transparent; border: 1px dashed #C84B4B;"></span> 折り線
  </span>
</div>

<footer>
  逆方向探索による折り紙の折り順自動生成 — MIRU 2026
